name: Test

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Prepare evidence directory
        run: mkdir -p artifacts

      - name: Run tests with coverage
        run: >-
          uv run pytest tests/ -v
          --cov=src/loopflow
          --cov-report=term
          --cov-report=xml:artifacts/python-coverage.xml
          --cov-report=json:artifacts/python-coverage.json
          --junitxml=artifacts/python-junit.xml

      - name: Verify AC manifest infrastructure
        run: uv run python scripts/check-ac-manifest.py --allow-planned

      - name: Upload Python evidence
        if: always() && matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: python-evidence
          path: artifacts/

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm audit --audit-level=low

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: web/coverage/

  browser:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:browser

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-evidence
          path: |
            web/playwright-report/
            web/test-results/

  wheel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: uv python install 3.10
      - run: npm ci --prefix web
      - run: ./scripts/wheel-smoke.sh
